        // Générer le menu à l'écran instantanément
        function buildMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            
            menuItems.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-col justify-between hover:scale-[1.01] transition">
                        <div>
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold text-gray-900">${item.id}. ${item.name}</h4>
                                <span class="text-red-600 font-bold">€ ${item.price.toFixed(2).replace('.',',')}</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">${item.desc}</p>
                        </div>
                        <button onclick="addToCart(${item.id})" class="mt-4 bg-gray-900 hover:bg-red-600 text-white text-xs font-bold py-2 px-3 rounded-lg transition">
                            + Toevoegen
                        </button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = menuItems.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            if(exist) { exist.quantity += 1; } 
            else { cart.push({ ...product, quantity: 1 }); }
            updateCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(p => p.id === id);
            if(item) {
                item.quantity += delta;
                if(item.quantity <= 0) cart = cart.filter(p => p.id !== id);
                updateCart();
            }
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            if(cart.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-6 text-sm">Uw winkelwagen is leeg.</p>';
                document.getElementById('cart-total').innerText = "€ 0,00";
                return;
            }

            cart.forEach(item => {
                total += item.price * item.quantity;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded border text-sm">
                        <div class="max-w-[60%]">
                            <h5 class="font-bold text-gray-800 truncate">${item.name}</h5>
                            <span class="text-xs text-gray-500">€ ${item.price.toFixed(2).replace('.',',')}</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="changeQty(${item.id}, -1)" class="w-6 h-6 bg-gray-200 rounded font-bold text-xs hover:bg-gray-300">-</button>
                            <span class="font-bold text-sm">${item.quantity}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="w-6 h-6 bg-gray-200 rounded font-bold text-xs hover:bg-gray-300">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = `€ ${total.toFixed(2).replace('.', ',')}`;
        }

        // Action de commande directe via WhatsApp
        function submitOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            if(!name || !phone) {
                alert("Vul alstublieft uw naam en telefoonnummer in.");
                return;
            }
            if(cart.length === 0) {
                alert("Uw winkelwagen is leeg.");
                return;
            }

            // Génération du texte WhatsApp
            let whatsappText = `*🚨 NIEUWE BESTELLING NAPOLI*\n\n`;
            whatsappText += `👤 *Klant:* ${name}\n`;
            whatsappText += `📞 *Telefoon:* ${phone}\n`;
            whatsappText += `📍 *Type:* ${address ? 'Bezorgen (' + address + ')' : 'Afhalen in restaurant'}\n\n`;
            whatsappText += `🛒 *Gerechten:*\n`;
            
            cart.forEach(item => {
                whatsappText += `• ${item.quantity}x ${item.name} (€ ${(item.price * item.quantity).toFixed(2).replace('.', ',')})\n`;
            });
            
            whatsappText += `\n💰 *Totaal te betalen:* € ${total.toFixed(2).replace('.', ',')}`;

            const pizzeriaWhatsAppNumber = "31599201165"; 
            const encodedText = encodeURIComponent(whatsappText);
            const whatsappUrl = `https://wa.me/${pizzeriaWhatsAppNumber}?text=${encodedText}`;
